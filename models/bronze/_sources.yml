version: 2

sources:
  - name: raw
    description: "Datos crudos de la operación de ventas, cargados desde archivos CSV."
    schema: raw
    tables:
      - name: clientes
        description: "Maestro de clientes desde el ERP."
      - name: pedidos
        description: "Cabeceras de pedidos desde el ERP."
      - name: pedido_items
        description: "Detalle (líneas) de cada pedido desde el ERP."
      - name: tiendas
        description: "Maestro de tiendas y puntos de venta."
      - name: devoluciones
        description: "Registro de devoluciones de productos."
      - name: crm_clientes
        description: "Maestro de clientes desde el sistema CRM."
      - name: ecommerce_productos
        description: "Catálogo de productos exclusivos del e-commerce."
      - name: ecommerce_pedidos
        description: "Pedidos realizados por el canal e-commerce."
      - name: ecommerce_pedido_items
        description: "Detalle de líneas de pedido del e-commerce."
